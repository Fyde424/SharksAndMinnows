<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sharks and Minnows Game</title>
    <script src="https://cjrtnc.cheerpj.com/3.0/loader.js"></script>
</head>
<body style="margin: 0; padding: 0; background-color: #222; display: flex; justify-content: center; align-items: center; height: 100vh;">

    <script>
        // Use an async function to enforce the sequential execution of the runtime loading sequence
        async function runGame() {
            // 1. Wait for CheerpJ to fully initialize the virtual environment
            await cheerpjInit();

            // 2. Create the display canvas for the Swing GUI
            cheerpjCreateDisplay(-1, -1); 

            // 3. Execute the target JAR from the root folder
            await cheerpjRunJar("/app/SharksAndMinnowsWeb.jar");
        }

        // Execute the function string on page load
        runGame();
    </script>

</body>
</html>
