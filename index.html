<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sharks and Minnows Game</title>
    <script src="https://cjrtnc.cheerpj.com/3.0/loader.js"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #111;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }
        /* Lock down dimensions to match your GameMenuMain JFrame constraints (640x600) */
        #game-container {
            width: 640px;
            height: 600px;
            background-color: #000;
            box-shadow: 0px 4px 15px rgba(0,0,0,0.5);
        }
    </style>
</head>
<body>

    <div id="game-container"></div>

    <script>
        async function runGame() {
            // Initialize environment with tailored configurations
            await cheerpjInit({ 
                enableDebug: true,
                disableLoadTimeReporting: true
            });

            const container = document.getElementById("game-container");
            
            // Force the underlying display canvas to mount directly at your exact project code bounds
            cheerpjCreateDisplay(640, 600, container); 

            // Execute game app
            await cheerpjRunJar("/app/SharksAndMinnowsWeb.jar");
        }

        runGame();
    </script>

</body>
</html>
